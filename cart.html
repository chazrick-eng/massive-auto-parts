<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — Massive Auto Parts &amp; Car Sales</title>
<meta name="description" content="Your parts cart. Review items, adjust quantities and proceed to checkout. Island-wide delivery or Ocho Rios pickup.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="">
<div id="site-header-slot"></div>

<section class="page-hero" data-screen-label="Cart">
  <div class="container">
    <div class="crumb"><a href="index.html">Home</a> / Cart</div>
    <h1>Your Cart</h1>
  </div>
</section>

<section class="section light" style="padding:40px 0 84px">
  <div class="container">
    <div class="cart-page-grid" id="cartPageWrap"></div>
  </div>
</section>

<div id="site-footer-slot"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/render.js"></script>
<script>
function renderCartPage() {
  const items = Cart.read();
  const wrap = document.getElementById("cartPageWrap");
  if (!items.length) {
    wrap.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:70px 20px;background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-lg)">
      <p style="font-size:22px;font-family:var(--font-display);text-transform:uppercase">Your cart is empty</p>
      <p style="color:var(--gray-600)">Browse parts and add them to your cart to check out.</p>
      <a class="btn btn-red btn-lg" href="parts.html" style="margin-top:14px">Shop Parts</a>
    </div>`;
    return;
  }
  const rows = items.map(i => `
    <div class="cart-row">
      ${thumbMedia(i)}
      <div>
        <a href="part-detail.html?id=${i.id}"><div class="cl-name" style="font-size:17px">${i.name}</div></a>
        <div class="cl-meta">${i.category} · ${fmtJMD(i.price)} each</div>
      </div>
      <div class="qty-stepper" style="height:42px">
        <button onclick="Cart.setQty('${i.id}', ${i.qty-1})">−</button>
        <input type="text" value="${i.qty}" readonly style="height:42px">
        <button onclick="Cart.setQty('${i.id}', ${i.qty+1})">+</button>
      </div>
      <div class="price" style="font-size:20px;text-align:right">${fmtJMD(i.price*i.qty)}</div>
      <button class="cl-remove" onclick="Cart.remove('${i.id}')" style="font-size:20px;color:var(--gray-600);background:none;border:none" aria-label="Remove">&times;</button>
    </div>`).join("");

  wrap.innerHTML = `
    <div>
      <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:8px 24px">
        ${rows}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:18px;flex-wrap:wrap;gap:10px">
        <a class="btn btn-ghost" href="parts.html">← Continue Shopping</a>
        <button class="btn btn-ghost" onclick="Cart.clear()">Clear Cart</button>
      </div>
    </div>
    <div class="summary-card">
      <h3>Order Summary</h3>
      <div class="summary-row"><span>Subtotal</span><span>${fmtJMD(Cart.subtotal())}</span></div>
      <div class="summary-row"><span>Delivery</span><span style="color:var(--gray-600)">Calculated at checkout</span></div>
      <div class="summary-row total"><span>Total</span><span class="amt">${fmtJMD(Cart.subtotal())}</span></div>
      <p class="cart-note" style="margin:12px 0">Choose island-wide delivery or free pickup at our Ocho Rios store on the next step.</p>
      <a class="btn btn-red btn-block btn-lg" href="checkout.html">Proceed to Checkout</a>
      <a class="btn btn-whatsapp btn-block" id="cartWa" target="_blank" rel="noopener" style="margin-top:8px">Questions? WhatsApp us</a>
    </div>`;
  const wa = document.getElementById("cartWa");
  if (wa) wa.href = WA_LINK("Hi Massive Auto — I have a question about my parts order.");
}
document.addEventListener("DOMContentLoaded", renderCartPage);
document.addEventListener("cart:change", renderCartPage);
</script>
</body>
</html>
