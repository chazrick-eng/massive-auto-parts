<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Parts — Massive Auto Parts &amp; Car Sales</title>
<meta name="description" content="Shop new & used Japanese auto parts online — engines, body parts, suspension, brakes, electrical & accessories. Island-wide delivery or Ocho Rios pickup.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="parts">
<div id="site-header-slot"></div>

<section class="page-hero" data-screen-label="Auto Parts">
  <div class="container">
    <div class="crumb"><a href="index.html">Home</a> / Auto Parts</div>
    <h1>Auto Parts</h1>
    <p>New &amp; used Japanese parts — add to cart and check out online. <span class="sample-note" style="color:#ddd;border-color:#444;background:rgba(255,255,255,.06)">All items &amp; prices are samples for layout</span></p>
  </div>
</section>

<section class="section light" style="padding:40px 0 84px">
  <div class="container">
    <div class="catalog-layout">
      <aside class="filter-panel" id="filterPanel">
        <h4>Filter</h4>
        <div class="filter-group">
          <label style="font-size:13px;font-weight:600;font-family:var(--font-display);text-transform:uppercase;display:block;margin-bottom:6px">Category</label>
          <div id="catFilters"></div>
        </div>
        <div class="filter-group">
          <label style="font-size:13px;font-weight:600;font-family:var(--font-display);text-transform:uppercase;display:block;margin-bottom:6px">Condition</label>
          <label class="cb"><input type="checkbox" class="f-cond" value="New"> New</label>
          <label class="cb"><input type="checkbox" class="f-cond" value="Used Japanese"> Used Japanese</label>
        </div>
        <div class="filter-group">
          <label style="font-size:13px;font-weight:600;font-family:var(--font-display);text-transform:uppercase;display:block;margin-bottom:6px">Make compatibility</label>
          <select class="f-select" id="makeFilter" style="width:100%"><option value="">All makes</option></select>
        </div>
        <div class="filter-group">
          <label style="font-size:13px;font-weight:600;font-family:var(--font-display);text-transform:uppercase;display:block;margin-bottom:6px">Max price (JMD)</label>
          <input type="range" id="priceRange" min="5000" max="180000" step="5000" value="180000" style="width:100%">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--gray-600);margin-top:4px"><span>$5k</span><span id="priceVal">$180k</span></div>
        </div>
        <button class="btn btn-ghost btn-sm btn-block" id="clearFilters" style="margin-top:8px">Clear Filters</button>
      </aside>

      <div>
        <div class="toolbar">
          <div class="search-in">
            <span id="searchIcon"></span>
            <input type="text" id="searchInput" placeholder="Search by part name, SKU or vehicle…">
          </div>
          <select class="f-select" id="sortSelect">
            <option value="featured">Sort: Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
        <div class="result-count" id="resultCount"></div>
        <div class="card-grid grid-3" id="partsGrid"></div>
        <div id="noResults" style="display:none;text-align:center;padding:60px 20px;color:var(--gray-600)">
          <p style="font-size:18px;font-family:var(--font-display)">No parts match your filters.</p>
          <p>Can't find what you need? <a href="contact.html#parts-request" class="red" style="text-decoration:underline">Send us a parts request</a> — we'll source it.</p>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="site-footer-slot"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/render.js"></script>
<script>
const state = { q:"", cats:new Set(), conds:new Set(), make:"", maxPrice:180000, sort:"featured" };

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("searchIcon").innerHTML = IC.search;

  // category checkboxes
  document.getElementById("catFilters").innerHTML = PART_CATEGORIES.map(c =>
    `<label class="cb"><input type="checkbox" class="f-cat" value="${c}"> ${c}</label>`).join("");
  // make options
  document.getElementById("makeFilter").insertAdjacentHTML("beforeend",
    MAKES.map(m => `<option value="${m}">${m}</option>`).join(""));

  // URL params
  const cat = qs("cat"); const q = qs("q");
  if (cat) { state.cats.add(cat); document.querySelector(`.f-cat[value="${cat}"]`)?.setAttribute("checked","checked"); document.querySelectorAll(".f-cat").forEach(cb=>{ if(cb.value===cat) cb.checked=true; }); }
  if (q) { state.q = q; document.getElementById("searchInput").value = q; }

  // listeners
  document.getElementById("searchInput").addEventListener("input", e => { state.q = e.target.value; render(); });
  document.querySelectorAll(".f-cat").forEach(cb => cb.addEventListener("change", () => { cb.checked ? state.cats.add(cb.value) : state.cats.delete(cb.value); render(); }));
  document.querySelectorAll(".f-cond").forEach(cb => cb.addEventListener("change", () => { cb.checked ? state.conds.add(cb.value) : state.conds.delete(cb.value); render(); }));
  document.getElementById("makeFilter").addEventListener("change", e => { state.make = e.target.value; render(); });
  document.getElementById("priceRange").addEventListener("input", e => { state.maxPrice = +e.target.value; document.getElementById("priceVal").textContent = "$" + Math.round(state.maxPrice/1000) + "k"; render(); });
  document.getElementById("sortSelect").addEventListener("change", e => { state.sort = e.target.value; render(); });
  document.getElementById("clearFilters").addEventListener("click", () => {
    state.q=""; state.cats.clear(); state.conds.clear(); state.make=""; state.maxPrice=180000; state.sort="featured";
    document.getElementById("searchInput").value=""; document.getElementById("makeFilter").value="";
    document.getElementById("priceRange").value=180000; document.getElementById("priceVal").textContent="$180k";
    document.querySelectorAll(".f-cat,.f-cond").forEach(cb=>cb.checked=false);
    document.getElementById("sortSelect").value="featured";
    render();
  });

  render();
});

function render() {
  let list = PARTS.slice();
  if (state.q) {
    const q = state.q.toLowerCase();
    list = list.filter(p => (p.name + " " + p.sku + " " + p.category + " " + p.compatibility.join(" ")).toLowerCase().includes(q));
  }
  if (state.cats.size) list = list.filter(p => state.cats.has(p.category));
  if (state.conds.size) list = list.filter(p => state.conds.has(p.condition));
  if (state.make) list = list.filter(p => p.compatibility.some(c => c.toLowerCase().includes(state.make.toLowerCase())));
  list = list.filter(p => p.price <= state.maxPrice);

  if (state.sort === "price-asc") list.sort((a,b)=>a.price-b.price);
  else if (state.sort === "price-desc") list.sort((a,b)=>b.price-a.price);
  else if (state.sort === "name") list.sort((a,b)=>a.name.localeCompare(b.name));
  else list.sort((a,b)=>(b.featured?1:0)-(a.featured?1:0));

  const grid = document.getElementById("partsGrid");
  const none = document.getElementById("noResults");
  document.getElementById("resultCount").textContent = `${list.length} part${list.length!==1?"s":""} found`;
  if (!list.length) { grid.innerHTML=""; none.style.display="block"; return; }
  none.style.display="none";
  grid.innerHTML = list.map(partCard).join("");
}
</script>
</body>
</html>
