<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Sales — Massive Auto Parts &amp; Car Sales</title>
<meta name="description" content="Quality used cars for sale in Ocho Rios, St. Ann. Toyota, Honda, Nissan, Mazda & more. Enquire or reserve — no card checkout for vehicles.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="cars">
<div id="site-header-slot"></div>

<section class="page-hero" data-screen-label="Car Sales">
  <div class="container">
    <div class="crumb"><a href="index.html">Home</a> / Car Sales</div>
    <h1>Cars For Sale</h1>
    <p>Inspected used vehicles, ready to drive. Enquire or reserve — vehicle purchases are handled in person, not by card checkout. <span class="sample-note" style="color:#ddd;border-color:#444;background:rgba(255,255,255,.06)">Sample inventory</span></p>
  </div>
</section>

<section class="section light" style="padding:36px 0 84px">
  <div class="container">
    <div class="toolbar" style="background:#fff;padding:16px;border:1px solid var(--gray-200);border-radius:var(--radius)">
      <select class="f-select" id="makeF"><option value="">All Makes</option></select>
      <select class="f-select" id="bodyF"><option value="">All Body Types</option></select>
      <select class="f-select" id="condF"><option value="">New &amp; Used</option><option value="New">New</option><option value="Used">Used</option></select>
      <select class="f-select" id="priceF">
        <option value="">Any Price</option>
        <option value="2500000">Under $2.5M</option>
        <option value="3000000">Under $3M</option>
        <option value="4000000">Under $4M</option>
      </select>
      <select class="f-select" id="sortF" style="margin-left:auto">
        <option value="featured">Sort: Featured</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="year">Year: Newest</option>
      </select>
    </div>
    <div class="result-count" id="vcount" style="margin-top:18px"></div>
    <div class="card-grid grid-3" id="vehGrid"></div>
    <div id="vNone" style="display:none;text-align:center;padding:60px 20px;color:var(--gray-600)">
      <p style="font-size:18px;font-family:var(--font-display)">No vehicles match your filters.</p>
      <p><a href="contact.html" class="red" style="text-decoration:underline">Contact us</a> — we get new arrivals regularly.</p>
    </div>
  </div>
</section>

<div id="site-footer-slot"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/render.js"></script>
<script>
const vstate = { make:"", body:"", cond:"", maxPrice:"", sort:"featured" };
document.addEventListener("DOMContentLoaded", () => {
  const makes = [...new Set(VEHICLES.map(v=>v.make))].sort();
  const bodies = [...new Set(VEHICLES.map(v=>v.bodyType))].sort();
  document.getElementById("makeF").insertAdjacentHTML("beforeend", makes.map(m=>`<option>${m}</option>`).join(""));
  document.getElementById("bodyF").insertAdjacentHTML("beforeend", bodies.map(b=>`<option>${b}</option>`).join(""));

  document.getElementById("makeF").addEventListener("change", e=>{vstate.make=e.target.value;renderV();});
  document.getElementById("bodyF").addEventListener("change", e=>{vstate.body=e.target.value;renderV();});
  document.getElementById("condF").addEventListener("change", e=>{vstate.cond=e.target.value;renderV();});
  document.getElementById("priceF").addEventListener("change", e=>{vstate.maxPrice=e.target.value;renderV();});
  document.getElementById("sortF").addEventListener("change", e=>{vstate.sort=e.target.value;renderV();});
  renderV();
});
function renderV() {
  let list = VEHICLES.slice();
  if (vstate.make) list = list.filter(v=>v.make===vstate.make);
  if (vstate.body) list = list.filter(v=>v.bodyType===vstate.body);
  if (vstate.cond) list = list.filter(v=>v.condition===vstate.cond);
  if (vstate.maxPrice) list = list.filter(v=>v.price != null && v.price <= +vstate.maxPrice);
  if (vstate.sort==="price-asc") list.sort((a,b)=>a.price-b.price);
  else if (vstate.sort==="price-desc") list.sort((a,b)=>b.price-a.price);
  else if (vstate.sort==="year") list.sort((a,b)=>b.year-a.year);
  else list.sort((a,b)=>(b.featured?1:0)-(a.featured?1:0));

  document.getElementById("vcount").textContent = `${list.length} vehicle${list.length!==1?"s":""} available`;
  const grid = document.getElementById("vehGrid"); const none = document.getElementById("vNone");
  if (!list.length){ grid.innerHTML=""; none.style.display="block"; return; }
  none.style.display="none";
  grid.innerHTML = list.map(vehicleCard).join("");
}
</script>
</body>
</html>
