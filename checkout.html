<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — Massive Auto Parts &amp; Car Sales</title>
<meta name="description" content="Checkout — delivery or in-store pickup, customer details and payment method. Reference build: payment wired at go-live.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="">
<div id="site-header-slot"></div>

<section class="page-hero" data-screen-label="Checkout">
  <div class="container">
    <div class="crumb"><a href="index.html">Home</a> / <a href="cart.html">Cart</a> / Checkout</div>
    <h1>Checkout</h1>
  </div>
</section>

<section class="section light" style="padding:40px 0 84px">
  <div class="container">
    <div class="steps">
      <div class="step active"><span class="n">1</span> Cart</div><span class="bar"></span>
      <div class="step active"><span class="n">2</span> Details</div><span class="bar"></span>
      <div class="step"><span class="n">3</span> Confirm</div>
    </div>
    <div id="checkoutWrap"></div>
  </div>
</section>

<div id="site-footer-slot"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/render.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const items = Cart.read();
  const wrap = document.getElementById("checkoutWrap");
  if (!items.length) {
    wrap.innerHTML = `<div style="text-align:center;padding:60px 20px;background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-lg)">
      <p style="font-size:20px;font-family:var(--font-display)">Your cart is empty</p>
      <a class="btn btn-red" href="parts.html" style="margin-top:12px">Shop Parts</a></div>`;
    return;
  }
  const summaryRows = items.map(i => `<div class="summary-row"><span>${i.qty} × ${i.name}</span><span>${fmtJMD(i.price*i.qty)}</span></div>`).join("");

  wrap.innerHTML = `
  <div class="cart-page-grid">
    <div class="form-card">
      <form class="form" id="checkoutForm" data-demo-form>
        <div class="hp"><label>Leave blank<input type="text" tabindex="-1" autocomplete="off"></label></div>
        <h3 style="font-size:20px;margin-bottom:4px">Delivery Method</h3>
        <div class="toggle-group keep" style="margin-bottom:10px">
          <label><input type="radio" name="fulfil" value="delivery" checked><span class="opt">Island-wide Delivery</span></label>
          <label><input type="radio" name="fulfil" value="pickup"><span class="opt">In-store Pickup</span></label>
        </div>

        <h3 style="font-size:20px;margin:8px 0 2px">Your Details</h3>
        <div class="row">
          <div class="field"><label>First name</label><input type="text" name="first" required></div>
          <div class="field"><label>Last name</label><input type="text" name="last" required></div>
        </div>
        <div class="row">
          <div class="field"><label>Phone / WhatsApp</label><input type="tel" name="phone" required></div>
          <div class="field"><label>Email</label><input type="email" name="email" required></div>
        </div>

        <div id="deliveryFields">
          <div class="field"><label>Delivery address</label><input type="text" name="address" placeholder="Street address"></div>
          <div class="row">
            <div class="field"><label>Town / City</label><input type="text" name="town"></div>
            <div class="field"><label>Parish</label>
              <select name="parish">
                <option>St. Ann</option><option>St. Mary</option><option>Trelawny</option><option>St. James</option>
                <option>Kingston</option><option>St. Andrew</option><option>Clarendon</option><option>Manchester</option>
                <option>St. Catherine</option><option>Portland</option><option>St. Thomas</option><option>St. Elizabeth</option>
                <option>Westmoreland</option><option>Hanover</option>
              </select>
            </div>
          </div>
        </div>
        <div id="pickupNote" style="display:none">
          <div class="golive-note" style="background:#eef6ff;border-color:#9cc3ff;color:#1a4b8a">Pickup at <b>158 Main Street, Pineapple, Ocho Rios Bay, St. Ann</b>. We'll WhatsApp/call when your order is ready. Hours: Mon–Sat 8:30am–6:00pm · Sun 9:00am–3:00pm.</div>
        </div>

        <h3 style="font-size:20px;margin:12px 0 2px">Payment Method</h3>
        <div class="pay-methods">
          <label class="pay-method sel"><input type="radio" name="pay" value="card" checked><div><div class="pm-name">Card (online gateway)</div><div class="pm-desc">Visa / Mastercard — processed at go-live via WiPay / Fygaro / FAC</div></div></label>
          <label class="pay-method"><input type="radio" name="pay" value="cash"><div><div class="pm-name">Cash on Pickup</div><div class="pm-desc">Pay in-store when you collect your parts</div></div></label>
          <label class="pay-method"><input type="radio" name="pay" value="transfer"><div><div class="pm-name">Bank Transfer</div><div class="pm-desc">NCB / Scotiabank — details sent after order</div></div></label>
        </div>
        <div class="golive-note">⚙️ <b>Reference build:</b> no live payment is processed here. At go-live, card payments connect to a hosted checkout (WiPay / Fygaro / First Atlantic Commerce) or the store is rebuilt on WooCommerce/Shopify using this design. Cash-on-pickup &amp; bank transfer work day one.</div>

        <button class="btn btn-red btn-block btn-lg" type="submit" style="margin-top:6px">Place Order</button>
        <div class="form-msg" role="status"></div>
      </form>
    </div>

    <div class="summary-card">
      <h3>Order Summary</h3>
      ${summaryRows}
      <div class="summary-row"><span>Delivery</span><span style="color:var(--gray-600)">Quoted after order</span></div>
      <div class="summary-row total"><span>Total</span><span class="amt">${fmtJMD(Cart.subtotal())}</span></div>
      <p class="cart-note" style="margin-top:12px">Sample pricing for demonstration. Final total incl. delivery &amp; any duties confirmed by our team.</p>
    </div>
  </div>`;

  // delivery/pickup toggle
  const fields = document.getElementById("deliveryFields");
  const pickup = document.getElementById("pickupNote");
  document.querySelectorAll('input[name="fulfil"]').forEach(r => r.addEventListener("change", () => {
    const isPickup = document.querySelector('input[name="fulfil"]:checked').value === "pickup";
    fields.style.display = isPickup ? "none" : "block";
    pickup.style.display = isPickup ? "block" : "none";
  }));
  // pay method highlight
  document.querySelectorAll('input[name="pay"]').forEach(r => r.addEventListener("change", () => {
    document.querySelectorAll(".pay-method").forEach(pm => pm.classList.remove("sel"));
    r.closest(".pay-method").classList.add("sel");
  }));

  // override form submit to show confirmation
  const form = document.getElementById("checkoutForm");
  form.addEventListener("submit", e => {
    e.preventDefault();
    const hp = form.querySelector(".hp input"); if (hp && hp.value) return;
    const orderNo = "MA-" + Math.floor(100000 + Math.random()*900000);
    const total = fmtJMD(Cart.subtotal());
    const name = form.first.value || "there";
    Cart.clear();
    document.querySelector(".steps").innerHTML = `
      <div class="step active"><span class="n">1</span> Cart</div><span class="bar"></span>
      <div class="step active"><span class="n">2</span> Details</div><span class="bar"></span>
      <div class="step active"><span class="n">3</span> Confirm</div>`;
    document.getElementById("checkoutWrap").innerHTML = `
      <div class="confirm-box">
        <div class="ok-ic">${IC.check}</div>
        <span class="eyebrow">Order received</span>
        <h2 style="font-size:34px;margin:6px 0">Thank You, ${name}!</h2>
        <p style="color:var(--gray-600)">Your order <b>${orderNo}</b> has been captured. Our team will contact you by phone/WhatsApp to confirm availability, delivery and payment.</p>
        <p style="margin-top:8px;font-family:var(--font-display);font-size:22px">Order total: <span class="red">${total}</span></p>
        <div class="golive-note" style="text-align:left;margin:20px auto;max-width:460px">Demo confirmation — no payment was taken. At go-live this submits via Formspree and (for card) redirects to the hosted payment gateway.</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
          <a class="btn btn-red" href="parts.html">Continue Shopping</a>
          <a class="btn btn-whatsapp" href="${WA_LINK('Hi Massive Auto — I just placed order '+orderNo+'.')}" target="_blank" rel="noopener">WhatsApp About My Order</a>
        </div>
      </div>`;
    window.scrollTo({top:0, behavior:"smooth"});
  });
});
</script>
</body>
</html>
